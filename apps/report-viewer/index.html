<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeCheck: Prototype Quality Report</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#07070a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="A reproducible quality report for a web prototype: screenshots, console errors, failed requests and accessibility findings, all observed in a real browser session."
    />

    <!-- Absolute URLs are required by Open Graph. They pin this build to the
         public demo host; update both if the demo ever moves. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VibeCheck" />
    <meta property="og:title" content="VibeCheck: Prototype Quality Report" />
    <meta
      property="og:description"
      content="A reproducible quality report for a web prototype, backed by real browser evidence."
    />
    <meta property="og:url" content="https://vibecheck.antonius.app/" />
    <meta property="og:image" content="https://vibecheck.antonius.app/og-image.png" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta
      property="og:image:alt"
      content="The VibeCheck report viewer showing a failing scan: 8 unique issues from 20 observations across three viewports."
    />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
